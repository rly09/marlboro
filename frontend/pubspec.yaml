name: cleancity_frontend
description: CleanCity AI - Smart Civic Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.2
  
  # Networking
  http: ^1.2.2
  
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.4.0
  
  # Location & Camera
  geolocator: ^13.0.4
  image_picker: ^1.1.2
  
  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  animations: ^2.0.11
  fl_chart: ^0.70.2
  confetti: ^0.7.0
  shimmer: ^3.0.0
  
  # Icons
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.3
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
